name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

      - name: Copy binary to bin
        run: |
          mkdir -p bin
          cp target/release/vcd bin/vcd

      - name: Package binary
        run: |
          tar -czf vcd-aarch64-apple-darwin.tar.gz -C bin vcd
          shasum -a 256 vcd-aarch64-apple-darwin.tar.gz > vcd-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: vcd-aarch64-apple-darwin
          path: |
            vcd-aarch64-apple-darwin.tar.gz
            vcd-aarch64-apple-darwin.tar.gz.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vcd-aarch64-apple-darwin.tar.gz
            vcd-aarch64-apple-darwin.tar.gz.sha256
