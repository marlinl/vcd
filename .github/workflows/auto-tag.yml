name: Auto Tag

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-master
  cancel-in-progress: false

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create next patch tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          if git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -q .; then
            echo "HEAD already has a release tag; skipping."
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.1.0"
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest release tag '${latest_tag}' is not valid semver."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${next_tag}" -m "Release ${next_tag}" HEAD
          git push origin "${next_tag}"
          gh workflow run ci.yml --ref "${next_tag}"
